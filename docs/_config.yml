title: Sovereign Epistemic Agent
description: >-
  Research blog for the Epistemic Tribunal — a metacognitive adjudication
  stack that stages governed conflict between competing hypotheses rather
  than trusting the first plausible answer.
url: "https://steake.github.io"
baseurl: "/Sovereign-Epistemic-Agent"
permalink: /:year/:month/:day/:title/

remote_theme: pages-themes/hacker@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
