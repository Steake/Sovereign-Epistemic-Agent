title: Sovereign Epistemic Agent
description: "Research blog for the Epistemic Tribunal — a metacognitive adjudication stack for reasoning under uncertainty."
baseurl: "/Sovereign-Epistemic-Agent"
url: "https://Steake.github.io"
remote_theme: pages-themes/midnight@v0.2.0
plugins:
  - jekyll-remote-theme

markdown: kramdown
highlighter: rouge

permalink: /blog/:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

collections:
  posts:
    output: true

exclude:
  - experiments/autocycle_latest.json
  - experiments/autocycle_log.jsonl
