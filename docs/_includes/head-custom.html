<!-- Include Mermaid and SVG Pan Zoom -->
<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  
  // Determine initial theme for Mermaid
  const savedTheme = localStorage.getItem('theme');
  const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  const initialTheme = (savedTheme === 'light' || (!savedTheme && prefersLight)) ? 'default' : 'dark';

  mermaid.initialize({ 
    startOnLoad: false, 
    theme: initialTheme,
    securityLevel: 'loose'
  });

  document.addEventListener('DOMContentLoaded', async () => {
    // Run mermaid render manually so we can hook into post-render
    try {
      await mermaid.run({
        querySelector: '.mermaid',
        postRenderCallback: (id) => {
          const svg = document.getElementById(id);
          if(svg) {
            svg.style.maxWidth = '100%';
            svg.style.height = 'auto';
            // Enable interactive pan and zoom
            svgPanZoom(svg, {
              zoomEnabled: true,
              controlIconsEnabled: true,
              fit: true,
              center: true,
              minZoom: 0.5,
              maxZoom: 10
            });
          }
        }
      });
    } catch (e) {
      console.error('Mermaid render error:', e);
    }
  });
</script>
