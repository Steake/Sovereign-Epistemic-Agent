# Default configuration for Epistemic Tribunal

# Tribunal scoring weights (must sum to 1.0 or be normalised internally)
tribunal:
  weights:
    uncertainty: 0.25    # alpha — U_i: uncertainty-derived quality
    critic: 0.35         # beta  — C_i: critic consistency score
    memory: 0.15         # gamma — M_i: memory / failure-similarity penalty
    invariant: 0.25      # delta — V_i: invariant compliance score

  # Minimum score to select a candidate (else resample or abstain)
  selection_threshold: 0.40
  # Minimum score to resample (below this → abstain)
  resample_threshold: 0.20
  # Maximum resampling attempts before abstaining
  max_resample_attempts: 2
  # If a single generator type dominates above this coalition mass, force RESAMPLE.
  diversity_floor: 0.90
  # Disable memory weighting until this many prior tasks have completed.
  ledger_warmup_tasks: 150

# Generator settings
generators:
  enabled:
    - greedy
    - diverse
    - adversarial
    - rule_first
    - minimal_description
  # Shared seed for deterministic mock logic
  seed: 42
  llm:
    model_name: "Jackrong/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2"
    max_new_tokens: 4096
    temperature: 0.1
    top_p: 0.95
    trust_remote_code: false
    # BF16 is natively accelerated on H200/B100 Tensor Cores.
    # Use "float16" for older Volta/Turing GPUs, "float32" to disable.
    torch_dtype: "bfloat16"
    # "auto" selects flash_attention_2 when flash-attn is installed, else sdpa.
    # Override with "flash_attention_2", "sdpa", or "eager".
    attn_implementation: "auto"

# Invariant extractor
invariants:
  confidence_threshold: 0.5
  enabled_checks:
    - object_count_preserved
    - colour_count_preserved
    - symmetry_expected
    - shape_transform_expected
    - size_relation_preserved
    - bounding_box_consistent
    - grid_dimensions_consistent

# Critic settings
critic:
  failure_similarity_weight: 0.20
  consistency_weight: 0.30
  rule_coherence_weight: 0.25
  morphology_weight: 0.25

# Uncertainty analyzer
uncertainty:
  entropy_bins: 10
  min_coalition_mass: 0.6

# Ledger
ledger:
  path: "data/tribunal_ledger.db"
  # Whether to write failure records even when tribunal selects a candidate
  always_record: false

# Benchmarking / resumability
benchmark:
  # Write SQLite + run_progress checkpoints every N tasks (0 disables intermediate checkpoints).
  checkpoint_every_n_tasks: 0

# Strange Loop memory v1 — pre-generation failure constraint injection
# When enabled, queries failure memory *before* generators run and injects
# negative guidance (bad answers to avoid, structural warnings) into prompts.
strange_loop:
  enabled: false
  max_bad_answers: 5
  max_warnings: 3
  min_similarity: 0.3
  same_task_boost: 1.5

# Logging
logging:
  level: "INFO"
  format: "rich"   # "rich" | "plain"
