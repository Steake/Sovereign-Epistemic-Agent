# Ablation Config: Controlled Diversity-Expansion (Stage 1)
# Model: Qwen3.5-27B.Q8_0 (H100/Sm90a)

ledger:
  path: "data/tribunal_ledger_ablation.db"

generators:
  seed: 42
  enabled:
    - "vllm_deterministic"
    - "vllm_creative"
    - "vllm_logical"
    - "vllm_adversarial"
    - "vllm_compact"
  configs:
    vllm_deterministic:
      type: "openai"
      model: "Qwen3.5-27B.Q8_0.gguf"
      temperature: 0.0
      prompt_style: "standard"
    vllm_creative:
      type: "openai"
      model: "Qwen3.5-27B.Q8_0.gguf"
      temperature: 0.7
      prompt_style: "standard"
    vllm_logical:
      type: "openai"
      model: "Qwen3.5-27B.Q8_0.gguf"
      temperature: 0.1
      prompt_style: "rule"
      system_prompt: "You are a rigid structural logician. Focus on strict coordinate-based transformations and grid-invariant rules."
    vllm_adversarial:
      type: "openai"
      model: "Qwen3.5-27B.Q8_0.gguf"
      temperature: 0.4
      prompt_style: "adversarial"
      system_prompt: "You are a critical skeptic. Propose elegant but non-obvious alternatives to the first rule you identify. Challenge the most simple geometric explanation."
    vllm_compact:
      type: "openai"
      model: "Qwen3.5-27B.Q8_0.gguf"
      temperature: 0.1
      include_think: False
      system_prompt: "Respond in raw JSON format only. Do not provide any reasoning, prose, or <think> tags. Provide the solution grid immediately."
