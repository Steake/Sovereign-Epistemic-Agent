# ============================================================================
# Experiment — CodeGen Priority on Custom 25 Tasks
# ============================================================================
# Goal: Test the efficacy of the new Python programmatic synthesis engine 
# directly on the hard custom 25-task set using deepseek-chat.
# ============================================================================

tribunal:
  adjudication_strategy: "standard"
  selection_threshold: 0.30
  resample_threshold: 0.10
  max_resample_attempts: 1
  diversity_floor: 0.0          # Allow single-generator decisions if confident
  ledger_warmup_tasks: 0
  guardrail_margin_threshold: 0.0   
  guardrail_min_coalition_mass: 0.20
  weights:
    uncertainty: 0.25
    critic: 0.35
    memory: 0.00
    invariant: 0.40
  structural_override:
    enabled: true
    v_threshold: 0.75
    c_threshold: 0.70
    margin_threshold: 0.03
    confidence_cap: 0.72

generators:
  enabled: ["llm_codegen", "greedy"]
  seed: 42
  configs:
    llm_codegen:
      type: "llm_codegen"
      model_name: "deepseek-chat"
      temperature: 0.2            
      max_new_tokens: 8192
      top_p: 0.95
      use_json_schema: false
      api_base: "https://api.deepseek.com"
      api_key: "${DEEPSEEK_API_KEY}"

ledger:
  path: "data/tribunal_codegen_25_ledger.db"

metadata:
  arm_name: "tribunal_codegen_25"
  experiment: "codegen_deepseek_chat"
  description: >
    Evaluates the newly implemented Python programmatic synthesizer using 
    deepseek-chat, targeting the 25 custom task dataset.
