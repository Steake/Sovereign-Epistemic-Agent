# Path B Sweep: STRICT
# Goal: Maximum safety, zero tolerance for logical ambiguity.

ledger:
  path: "data/tribunal_ledger_path_b_strict.db"

tribunal:
  structural_override:
    enabled: true
    v_threshold: 1.0     # Perfect invariants only
    c_threshold: 0.9     # Near-total within-family consensus
    margin_threshold: 0.05 # Explicit structural lead
    confidence_cap: 0.70

generators:
  seed: 42
  enabled: ["vllm_deterministic", "vllm_creative", "vllm_logical", "vllm_adversarial", "vllm_compact"]
  configs:
    vllm_deterministic: {type: "openai", model: "Qwen3.5-27B.Q8_0.gguf", temperature: 0.0}
    vllm_creative:      {type: "openai", model: "Qwen3.5-27B.Q8_0.gguf", temperature: 0.7}
    vllm_logical:       {type: "openai", model: "Qwen3.5-27B.Q8_0.gguf", temperature: 0.1, prompt_style: "rule"}
    vllm_adversarial:   {type: "openai", model: "Qwen3.5-27B.Q8_0.gguf", temperature: 0.4, prompt_style: "adversarial"}
    vllm_compact:       {type: "openai", model: "Qwen3.5-27B.Q8_0.gguf", temperature: 0.1, include_think: false}
