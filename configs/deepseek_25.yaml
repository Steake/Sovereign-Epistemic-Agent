# DeepSeek Reasoner — 25-task benchmark run
tribunal:
  ledger_warmup_tasks: 0
  adjudication_strategy: "standard"
  weights:
    memory: 0.0
generators:
  enabled: ["llm"]
  llm:
    model_name: "deepseek-reasoner"
    max_new_tokens: 8192
    temperature: 0.0
    top_p: 0.95
    use_json_schema: false
ledger:
  path: "data/deepseek_25_ledger.db"
metadata:
  arm_name: "deepseek_reasoner_25"
  experiment: "phase1_deepseek_comparison"
